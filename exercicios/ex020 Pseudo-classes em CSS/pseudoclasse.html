<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes</title>
    <style>
        div {
            text-align: center;
            background-color: gray;
            height: 200px;
            width: 200px;
            display: inline-block;
            border: 1px solid black;
        }
        div:hover {
            background-color: gold;
        }
    </style>
</head>
<body>
    <div>A1</div>
    <div>A2</div>
    <div>A3</div>
</body>
</html>
