<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p><h3>Passe o mouse em cima dos nomes das tag para saber como usar-las</h3></p>
    <ul>
        <li><abbr title="Basta digitar &lt;p&gt;">Paragráfos</abbr></li>
        <li><abbr title="Funciona do &lt;h1&gt; até &lt;h6&gt;">Títulos</abbr></li>
        <li><abbr title="Digite &lt;img&gt;">Imagens</abbr></li>
        <li><abbr title="Facil, &lt;abbr&gt;">Abreviações</abbr></li>
        <li><abbr title="use a tag &lt;code&gt;">Codigo-fonte</abbr></li>
        <li><abbr title="&lt;ol&gt; e &lt;li&gt;">Listas númeradas</abbr></li>
        <li><abbr title="a tag &lt;ul&gt; e &lt;li&gt;">Listas com dermacadores</abbr></li>

    </ul>
</body>
</html>
